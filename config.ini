[common_settings]
# 当前是否为调试环境
debug=False
; 是否在机器翻译的译文前添加TODO标记，方便搜索润色。True开启，False关闭
open_todo=True

[filter_texts]
; 专用于RPG，当JSON翻译文本中，文本的值赋成NONE，则工具在写入新的data数据文件时会忽略该文本。最好不要改动，避免后续文本更新不通用。
none_filter=NONE
; 专用于RPG，用于标记不翻译文本，可配置多个标记，使用半角逗号“,”隔开，逗号之间不要留空格。设定好后最好不要删除，避免后续文本更新不通用，如需改动，可以在后面添加新的。
pass_filter=PASS,USELESS

[rpy_trans_tool]
; 待翻提取文本默认所在目录。若留空，则在程序运行时手动输入。翻译完成的提取文本默认存入待翻文本所在父目录，末尾添加'-new'以区分
; rpy_input_abspath=D:\2R-Tools\RenPy Workspace\XXX\chinese
rpy_input_abspath=
; 翻译文本最大缓存数，缓存数达到指定值则进行一次文件写入。程序设定最小值为0，即不缓存，处理一次便写入文件一次（不推荐）
rpy_bap_max_cache=50

[rpy_update_tool]
; 旧提取文本默认所在目录。若留空，则在程序运行时手动输入
rpy_old_abspath=
; rpy_old_abspath=D:\2R-Tools\RenPy Workspace\XXX\chinese
; 新提取文本默认所在目录。若留空，则在程序运行时手动输入。更新完成的提取文本默认存入新提取文本当前所在目录中，末尾添加'-new'以区分
rpy_new_abspath=
; rpy_new_abspath=D:\2R-Tools\RenPy Workspace\XXX\chinese-new
; 待处理区块最大缓存数。程序设定最小值为0，即不缓存，处理一次便写入文件一次（不推荐）
rpy_bap_max_cache=100

[json_trans_tool]
; 翻译最大缓存数。程序设定最小值为0，即不缓存，翻译一次便写入文件一次（不推荐）
json_max_cache=50

[rpgm_extraction_writing]
; rpgm游戏旧翻译文本，将其置入libraries文件夹即可在提取新翻译文件时自动录入已有译文
rpg_game_default_txt=gameText.json
; 扫描白名单
rpg_white_list=Actors,Armors,Classes,CommonEvents,Enemies,Items,Skills,States,System,Troops,Weapons,BattleHUD,MapHUD
; 无需使用标识符区分相同文本的可去重列表
rpg_duplicate_removal_list=Actors,Classes,Enemies,Troops
; array -> object数据结构
rpg_type_array_object=Actors,Armors,Classes,Enemies,Items,Skills,States,Troops,Weapons
; 脚本中有需要显示的文本时，使用正则匹配。可同时匹配多项，使用半角逗号“,”隔开，逗号之间不要留空格
rpg_script_regexp=


; 翻译API接口通行证（敏感内容，请妥善保管）及其他设置，放在这里是为了方便统一管理
; 腾讯翻译
[tencent_api]
; 密钥
