; Ollama框架本地AI翻译
[ollama_api]
; 当前调用模型名称。
model_name=
; model_name=gemma3:4b
; 是否启用Ollama本地AI翻译引擎，默认False关闭，环境部署完成后可True开启
activate=False

; 生成文本时可预测的最大令牌数。官方默认-1，表示无限生成
num_predict=2048
; 模型的温度。提高温度会使模型的回答更具创造性。取值范围：0.0-2.0，官方默认0.8
temperature=0.8
; 替代 top_p参数，旨在确保生成结果在质量与多样性之间取得平衡。参数 p 表示一个词元（token）被考虑的最低概率阈值，该阈值相对于最可能词元的概率。例如，当 p=0.05 且最可能词元的概率为 0.9 时，概率值低于 0.045 的词元将被过滤掉。官方默认0.0
min_p=0.0
; 核采样。与 top-k配合使用。较高的值（例如 0.95）将生成更多样化的文本，而较低的值（例如 0.5）将生成更聚焦、更保守的文本。取值范围：0.0-1.0，官方默认0.9
top_p=0.9
; 降低生成无意义内容的概率。较高的值（例如100）将产生更多样化的答案，而较低的值（例如10）则更加保守。取值范围：1-50，官方默认40
top_k=40
; 设置对重复内容的惩罚强度。数值越高（例如1.5），对重复内容的惩罚越强；数值越低（例如0.9），则越宽松。官方默认1.1
repeat_penalty=1.1
; 设置用于生成的随机数种子。将此值设置为特定数字将使模型对相同的提示生成相同的文本。官方默认0
seed=0

; Transformers框架本地AI翻译
[hunyuan_mt_api]
; 模型的绝对路径
model_path=
; model_path=D:\AI_Projects\Hunyuan-MT\Hunyuan-MT1.5-7B
; model_path=D:\AI_Projects\Hunyuan-MT\HY-MT1.5-1.8B
; 是否启用Hunyuan-MT模型本地AI翻译引擎，默认False关闭，环境部署完成后可True开启
activate=False

; 当内存不足时，可以使用bitsandbytes库来减小模型的内存占用，使得在计算资源有限的情况下也能处理大型模型。
; 选择模型加载量化方式.0: 不启用量化；1: 8bit量化；2: 4bit量化；3: NF4量化；4: 双量化；5: QLoRA量化
load_flag=1
; 新生成 token 数量
max_new_tokens=2048
; 模型的温度。提高温度会使模型的回答更具创造性。取值范围：0.0-2.0，官方默认0.7
temperature=0.7
; 核采样。与 top-k配合使用。较高的值（例如 0.95）将生成更多样化的文本，而较低的值（例如 0.5）将生成更聚焦、更保守的文本。取值范围：0.0-1.0，官方默认0.6
top_p=0.6
; 降低生成无意义内容的概率。较高的值（例如100）将产生更多样化的答案，而较低的值（例如10）则更加保守。取值范围：1-50，官方默认20
top_k=20
; 设置对重复内容的惩罚强度。数值越高（例如1.5），对重复内容的惩罚越强；数值越低（例如0.9），则越宽松。官方默认1.05
repetition_penalty=1.05
